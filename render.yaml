# Render Blueprint - Backend API
# Deploy automático via GitHub

services:
  - type: web
    name: cras-agendamentos-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: ./node_modules/.bin/prisma db push && node scripts/createAdmin.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Configure manualmente no painel do Render
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false  # URL do Vercel após deploy
      - key: ADMIN_MATRICULA
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /health
    autoDeploy: true
